name: Build Blog

on:
  push:
    branches:
      - main
    paths:
      - 'blog/posts/**'
      - 'en/blog/posts/**'
      - 'ua/blog/posts/**'
      - 'scripts/**'
      - '.github/workflows/build-blog.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install markdown jinja2 pyyaml

      - name: Build blog
        run: python scripts/build_blog.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/ en/blog/ ua/blog/ sitemap.xml || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-build: regenerate blog from Markdown posts"
            git push
          fi
